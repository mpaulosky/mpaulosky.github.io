name: lint-yaml

on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Run yamllint
        run: |
          python -m pip install --quiet yamllint
          files=$(git ls-files '*.yml' '*.yaml')
          if [ -z "$files" ]; then
            echo "No YAML files found."
            exit 0
          fi
          yamllint -s $files

